<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7番劇場's Portfolio</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>7番劇場's Portfolio</h1>
            <p>AIとデザインで、アイデアを形にするWebデベロッパー見習いです。</p>
        </header>

        <main class="works-grid">
            <div class="card">
                <img src="/images/artisan-palette.png" alt="Artisan Paletteのスクリーンショット">
                <h3>Artisan Palette</h3>
                <p>テーマを入力するとAIが配色とコンセプトを提案してくれる、クリエイティブ支援ツールです。</p>
                <div class="card-links">
                    <a href="https://artisan-palette.web.app" target="_blank" class="link-app">アプリを試す</a>
                    <a href="https://github.com/Theater-No7/portfolio/tree/main/artisan-palette-app" target="_blank" class="link-github">コードを見る</a>
                </div>
            </div>

            <div class="card">
                <img src="/images/summarizer-app.png" alt="AI Summarizerのスクリーンショット">
                <h3>AI Summarizer</h3>
                <p>長い文章を貼り付けると、AIが3行で要約してくれる、シンプルな効率化ツールです。</p>
                <div class="card-links">
                    <a href="https://text-ai-summarizer.web.app" target="_blank" class="link-app">アプリを試す</a>
                    <a href="https://github.com/Theater-No7/portfolio/tree/main/summarizer-app" target="_blank" class="link-github">コードを見る</a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
