<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Palette - AI Color Palette Generator</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body>

  <div class="container">
    <header>
      <h1>Artisan Palette</h1>
      <p>AI Concept Color Palette Generator</p>
    </header>

    <main>
      <div class="input-section">
          <label for="theme-input">どのようなテーマの配色が見たいですか？</label>
          <input type="text" id="theme-input" placeholder="例：雨上がりの紫陽花、サイバーパンクな東京の夜">
          <button id="generate-button">パレットを生成する</button>
      </div>

      <div id="result-section" class="hidden">
          <h2>AIが生成したカラーパレット</h2>
          <div id="palette-container"></div>
          <h3>AIによるコンセプト解説</h3>
          <div id="palette-explanation"></div>
      </div>
    </main>
  </div>

    <script src="/js/main.js"></script>
</body>
</html>
