<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - Artisan Palette</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h1>Artisan Palette</h1>
            <p class="welcome-message">ギャラリーへようこそ</p>
            <p class="description">ログインして、あなただけのパレットギャラリーを始めましょう。</p>
            
            <button id="google-login-button" class="google-btn">
                <img src="images/google-logo.png" alt="Google Logo">
                <span>Googleでログイン</span>
            </button>
        </div>
    </div>

    <footer class="attribution-footer">
        <p>
            <a target="_blank" href="https://icons8.com/icon/hnWNElnStyCk/google">Googleのロゴ</a>
            アイコン by 
            <a target="_blank" href="https://icons8.com">Icons8</a>
        </p>
    </footer>

    <script type="module" src="/js/login.js"></script>

</body>
</html>
