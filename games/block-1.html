<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご主人様のブロック崩しゲーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c; /* ダークな背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* スクロールを禁止 */
        }
        canvas {
            background-color: #000000; /* ゲーム領域は黒 */
            border: 4px solid #4a90e2; /* 鮮やかな青色のボーダー */
            border-radius: 15px; /* 丸みを帯びた角 */
            display: block;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.7); /* グロー効果 */
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background-color: #2d3748; /* コンテナの背景 */
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); /* 影 */
            max-width: 90%;
            width: 700px; /* ある程度の固定幅 */
        }
        .title {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 20px;
            color: #e2e8f0;
            font-size: 1.2rem;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .control-button {
            background-color: #4a90e2; /* ボタンの背景 */
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            text-transform: uppercase; /* 大文字 */
        }
        .control-button:hover {
            background-color: #357bd8; /* ホバー時の色 */
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        .control-button:active {
            background-color: #2a6ab5; /* クリック時の色 */
            transform: translateY(1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }
        .message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9); /* より暗い背景 */
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.8rem; /* 少し小さくして読みやすく */
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6); /* グローを強調 */
            display: none; /* 初期状態では非表示 */
            max-width: 80%; /* 幅を制限 */
            box-sizing: border-box; /* パディングを含める */
        }
        .message-box button {
            background-color: #4CAF50; /* 緑色のボタン */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1.2rem;
            transition: background-color 0.3s ease;
        }
        .message-box button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="title">✨ ご主人様のブロック崩しゲーム ✨</h1>
        <div class="game-info">
            <div id="score">スコア: 0</div>
            <div id="lives">ライフ: 3</div>
        </div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div class="controls">
            <button id="startButton" class="control-button">ゲーム開始</button>
            <button id="resetButton" class="control-button">リセット</button>
            <button id="hintButton" class="control-button">AIヒントを生成✨</button>
            <button id="storyButton" class="control-button">ゲームの物語を生成✨</button> <!-- 新しいボタン -->
        </div>
    </div>

    <div id="messageBox" class="message-box">
        <span id="messageText"></span>
        <button id="messageButton">OK</button>
    </div>

    <script>
        // キャンバスとコンテキストを取得
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲームの状態変数
        let score = 0;
        let lives = 3;
        let gameStarted = false;
        let intervalId; // ゲームループのインターバルID

        // UI要素
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const startButton = document.getElementById('startButton');
        const resetButton = document.getElementById('resetButton');
        const hintButton = document.getElementById('hintButton');
        const storyButton = document.getElementById('storyButton'); // 新しいボタンの参照
        const messageBox = document.getElementById('messageBox');
        const messageText = document.getElementById('messageText');
        const messageButton = document.getElementById('messageButton');

        // パドル設定
        const paddleWidth = 100;
        const paddleHeight = 15;
        let paddleX = (canvas.width - paddleWidth) / 2;
        const paddleY = canvas.height - paddleHeight - 10;
        let rightPressed = false;
        let leftPressed = false;

        // ボール設定
        const ballRadius = 8;
        let ballX = canvas.width / 2;
        let ballY = paddleY - ballRadius;
        let ballDx = 3; // ボールのX方向速度
        let ballDy = -3; // ボールのY方向速度

        // ブロック設定
        const brickRowCount = 5;
        const brickColumnCount = 8;
        const brickWidth = 65;
        const brickHeight = 20;
        const brickPadding = 10;
        const brickOffsetTop = 30;
        const brickOffsetLeft = 30;
        const brickColors = ['#e74c3c', '#f39c12', '#f1c40f', '#2ecc71', '#3498db']; // ブロックの色配列

        let bricks = [];
        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1, color: brickColors[r] }; // status 1: 存在する
                }
            }
        }

        // ゲームの初期化
        function resetGame() {
            score = 0;
            lives = 3;
            paddleX = (canvas.width - paddleWidth) / 2;
            ballX = canvas.width / 2;
            ballY = paddleY - ballRadius;
            ballDx = 3;
            ballDy = -3;
            initBricks();
            updateUI();
            stopGame(); // ゲームループを停止
            gameStarted = false; // ゲーム開始フラグをリセット
            startButton.textContent = 'ゲーム開始'; // ボタンのテキストをリセット
        }

        // UIの更新
        function updateUI() {
            scoreDisplay.textContent = `スコア: ${score}`;
            livesDisplay.textContent = `ライフ: ${lives}`;
        }

        // メッセージボックスを表示
        function showMessageBox(message, onConfirm) {
            messageText.textContent = message;
            messageBox.style.display = 'block';
            messageButton.onclick = () => {
                messageBox.style.display = 'none';
                if (onConfirm) {
                    onConfirm();
                }
            };
        }

        // 描画関数
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#e67e22"; // ボールの色 (オレンジ)
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddleX, paddleY, paddleWidth, paddleHeight, 5); // 角丸のパドル
            ctx.fillStyle = "#27ae60"; // パドルの色 (緑)
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        const brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brickWidth, brickHeight, 3); // 角丸のブロック
                        ctx.fillStyle = bricks[c][r].color;
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        // 衝突判定
        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (ballX > b.x && ballX < b.x + brickWidth && ballY > b.y && ballY < b.y + brickHeight) {
                            ballDy = -ballDy; // ボールのY方向を反転
                            b.status = 0; // ブロックを破壊
                            score += 10;
                            updateUI();

                            // 全てのブロックを破壊したかチェック
                            let allBricksBroken = true;
                            for (let col = 0; col < brickColumnCount; col++) {
                                for (let row = 0; row < brickRowCount; row++) {
                                    if (bricks[col][row].status === 1) {
                                        allBricksBroken = false;
                                        break;
                                    }
                                }
                                if (!allBricksBroken) break;
                            }

                            if (allBricksBroken) {
                                showMessageBox("🎉 ご主人様、全てのブロックを破壊しました！お見事です！ 🎉", () => {
                                    resetGame();
                                });
                                stopGame();
                                return;
                            }
                        }
                    }
                }
            }
        }

        // ゲーム描画ループ
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // キャンバスをクリア

            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            // ボールの壁との衝突
            if (ballX + ballDx > canvas.width - ballRadius || ballX + ballDx < ballRadius) {
                ballDx = -ballDx;
            }
            if (ballY + ballDy < ballRadius) {
                ballDy = -ballDy;
            } else if (ballY + ballDy > canvas.height - ballRadius) {
                // ボールがパドルに当たったかチェック
                if (ballX > paddleX && ballX < paddleX + paddleWidth) {
                    ballDy = -ballDy; // ボールを跳ね返す
                    // パドルのどの部分に当たったかでX方向の速度を調整
                    const hitPoint = ballX - (paddleX + paddleWidth / 2);
                    ballDx = hitPoint * 0.1; // 中央に近いほどまっすぐ、端に近いほど角度がつく
                } else {
                    // ボールが地面に落ちた場合
                    lives--;
                    updateUI();
                    if (lives === 0) {
                        showMessageBox("💥 ゲームオーバーです、ご主人様。でも、また挑戦すればきっと成功します！ 💥", () => {
                            resetGame();
                        });
                        stopGame();
                        return;
                    } else {
                        // ボールとパドルの位置をリセット
                        ballX = canvas.width / 2;
                        ballY = paddleY - ballRadius;
                        ballDx = 3;
                        ballDy = -3;
                        paddleX = (canvas.width - paddleWidth) / 2;
                    }
                }
            }

            // パドルの移動
            if (rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 7;
            } else if (leftPressed && paddleX > 0) {
                paddleX -= 7;
            }

            // ボールの移動
            ballX += ballDx;
            ballY += ballDy;
        }

        // キーボードイベントハンドラ
        document.addEventListener("keydown", keyDownHandler, false);
        document.addEventListener("keyup", keyUpHandler, false);
        document.addEventListener("mousemove", mouseMoveHandler, false); // マウス移動に対応

        function keyDownHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") {
                rightPressed = true;
            } else if (e.key === "Left" || e.key === "ArrowLeft") {
                leftPressed = true;
            }
        }

        function keyUpHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") {
                rightPressed = false;
            } else if (e.key === "Left" || e.key === "ArrowLeft") {
                leftPressed = false;
            }
        }

        function mouseMoveHandler(e) {
            const relativeX = e.clientX - canvas.offsetLeft;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
                if (paddleX < 0) paddleX = 0;
                if (paddleX > canvas.width - paddleWidth) paddleX = canvas.width - paddleWidth;
            }
        }

        // ゲーム開始/停止
        function startGame() {
            if (!gameStarted) {
                gameStarted = true;
                intervalId = setInterval(draw, 10); // 10ミリ秒ごとに描画
                startButton.textContent = 'プレイ中...';
            }
        }

        function stopGame() {
            clearInterval(intervalId);
            gameStarted = false;
            startButton.textContent = 'ゲーム開始';
        }

        // Gemini API を使用してゲームのヒントを生成する関数
        async function generateGameHint() {
            showMessageBox("AIがヒントを考えています...🤖");
            try {
                const prompt = `ブロック崩しゲームをプレイしている人への、短くて役立つヒントを1つだけ提供してください。プレイヤーは現在スコアが${score}、ライフが${lives}です。ヒントはポジティブで、日本のプレイヤー向けに日本語でお願いします。例: 「ボールの軌道をよく見て、パドルの真ん中で受け止めるように意識しましょう。」`;
                let chatHistory = [];
                chatHistory.push({ role: "user", parts: [{ text: prompt }] });
                const payload = { contents: chatHistory };
                const apiKey = ""; // APIキーはCanvasによって自動的に提供されます
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (result.candidates && result.candidates.length > 0 &&
                    result.candidates[0].content && result.candidates[0].content.parts &&
                    result.candidates[0].content.parts.length > 0) {
                    const hintText = result.candidates[0].content.parts[0].text;
                    showMessageBox(`✨AIからのヒント: ${hintText}`);
                } else {
                    showMessageBox("ヒントの生成に失敗しました。もう一度お試しください。");
                }
            } catch (error) {
                console.error('Error generating hint:', error);
                showMessageBox("ヒントの生成中にエラーが発生しました。ネットワーク接続を確認してください。");
            }
        }

        // Gemini API を使用してゲームの物語を生成する関数
        async function generateGameStory() {
            showMessageBox("AIが物語を紡いでいます...📚");
            try {
                const prompt = `ブロック崩しゲームのボール、パドル、ブロックについて、短くて可愛らしい物語を創作してください。物語はポジティブで、日本のプレイヤー向けに日本語でお願いします。例: 「昔々、世界にはカラフルなブロックの壁がありました。そこに元気なボールがやってきて、パドルと一緒に冒険を始めました...」`;
                let chatHistory = [];
                chatHistory.push({ role: "user", parts: [{ text: prompt }] });
                const payload = { contents: chatHistory };
                const apiKey = ""; // APIキーはCanvasによって自動的に提供されます
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (result.candidates && result.candidates.length > 0 &&
                    result.candidates[0].content && result.candidates[0].content.parts &&
                    result.candidates[0].content.parts.length > 0) {
                    const storyText = result.candidates[0].content.parts[0].text;
                    showMessageBox(`✨AIが紡ぐ物語:\n\n${storyText}`);
                } else {
                    showMessageBox("物語の生成に失敗しました。もう一度お試しください。");
                }
            } catch (error) {
                console.error('Error generating story:', error);
                showMessageBox("物語の生成中にエラーが発生しました。ネットワーク接続を確認してください。");
            }
        }


        // イベントリスナー
        startButton.addEventListener('click', startGame);
        resetButton.addEventListener('click', resetGame);
        hintButton.addEventListener('click', generateGameHint);
        storyButton.addEventListener('click', generateGameStory); // 新しいボタンのイベントリスナー
        messageButton.addEventListener('click', () => {
            messageBox.style.display = 'none';
        });


        // 初期設定
        resetGame(); // ゲームを初期状態にリセット
    </script>
</body>
</html>
